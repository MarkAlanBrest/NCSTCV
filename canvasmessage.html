<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Course To-Do Summary</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    padding: 20px;
    display: flex;
    justify-content: center;
  }
  .widget {
    width: 460px;
    background: white;
    border-radius: 12px;
    border: 1px solid #e0e4ea;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .header {
    background: #185FA5;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header h1 {
    font-size: 16px;
    font-weight: 600;
    color: #E6F1FB;
  }
  .body {
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .greeting {
    font-size: 14px;
    color: #555;
    line-height: 1.5;
  }
  .greeting strong { color: #222; }
  .divider { height: 1px; background: #eee; }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .section-label.missing { color: #993C1D; }
  .section-label.upcoming { color: #185FA5; }
  .chips { display: flex; flex-direction: column; gap: 6px; }
  .chip {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.4;
  }
  .chip.missing-chip {
    background: #FAECE7;
    border: 1px solid #F0997B;
    color: #4A1B0C;
  }
  .chip.upcoming-chip {
    background: #E6F1FB;
    border: 1px solid #85B7EB;
    color: #042C53;
  }
  .chip.empty {
    background: #f5f5f5;
    border: 1px solid #ddd;
    color: #888;
  }
  .chip-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 4px;
  }
  .missing-chip .chip-dot { background: #D85A30; }
  .upcoming-chip .chip-dot { background: #378ADD; }
  .chip-name { flex: 1; }
  .chip-due {
    font-size: 11px;
    white-space: nowrap;
    margin-top: 1px;
  }
  .missing-chip .chip-due { color: #993C1D; }
  .upcoming-chip .chip-due { color: #185FA5; }
  .footer { font-size: 13px; color: #666; }
  .footer strong { color: #222; }
  .loading { font-size: 13px; color: #888; }
  .error-msg {
    font-size: 13px;
    color: #993C1D;
    background: #FAECE7;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #F0997B;
  }
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <!-- Bell icon -->
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 2a6 6 0 0 1 6 6v3.5l1.4 2.1A1 1 0 0 1 16.5 15H3.5a1 1 0 0 1-.9-1.4L4 11.5V8a6 6 0 0 1 6-6z" fill="#B5D4F4"/>
      <path d="M8 15a2 2 0 0 0 4 0" fill="#85B7EB"/>
    </svg>
    <h1>Your To-Do Summary</h1>
  </div>
  <div class="body" id="body">
    <p class="loading">Loading your information…</p>
  </div>
</div>

<script>
async function safeFetch(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.statusText);
    return await r.json();
  } catch (e) {
    return null;
  }
}

function chip(text, type, due) {
  const d = document.createElement('div');
  d.className = `chip ${type}-chip`;
  const dot = document.createElement('span');
  dot.className = 'chip-dot';
  const name = document.createElement('span');
  name.className = 'chip-name';
  name.textContent = text;
  d.appendChild(dot);
  d.appendChild(name);
  if (due) {
    const dueEl = document.createElement('span');
    dueEl.className = 'chip-due';
    dueEl.textContent = due;
    d.appendChild(dueEl);
  }
  return d;
}

function emptyChip(text) {
  const d = document.createElement('div');
  d.className = 'chip empty';
  d.textContent = text;
  return d;
}

async function init() {
  const body = document.getElementById('body');
  const params = new URL(window.location.href).searchParams;
  const courseId = params.get('course_id');

  if (!courseId) {
    body.innerHTML = '';
    const e = document.createElement('p');
    e.className = 'error-msg';
    e.textContent = 'Missing course_id. Make sure your Canvas iframe includes ?course_id={{course.id}}';
    body.appendChild(e);
    return;
  }

  const [student, teachers, submissions] = await Promise.all([
    safeFetch('/api/v1/users/self/profile'),
    safeFetch(`/api/v1/courses/${courseId}/teachers`),
    safeFetch(`/api/v1/courses/${courseId}/students/submissions?student_ids[]=self&include[]=assignment&per_page=100`)
  ]);

  if (!student || !submissions) {
    body.innerHTML = '';
    const e = document.createElement('p');
    e.className = 'error-msg';
    e.textContent = 'Could not load your data. Make sure this page is embedded inside Canvas.';
    body.appendChild(e);
    return;
  }

  const teacherName = (teachers && teachers.length > 0) ? teachers[0].short_name : 'Your Teacher';
  const now = new Date();
  const twoWeeksAgo = new Date(now - 14 * 864e5);
  const twoWeeksAhead = new Date(now.getTime() + 14 * 864e5);
  const missing = [], upcoming = [];

  submissions.forEach(sub => {
    const a = sub.assignment;
    if (!a || !a.due_at) return;
    const due = new Date(a.due_at);
    if (sub.missing && due >= twoWeeksAgo && due <= now) {
      missing.push(a.name);
    }
    if (due >= now && due <= twoWeeksAhead) {
      upcoming.push({ name: a.name, due: due.toLocaleDateString() });
    }
  });

  body.innerHTML = '';

  // Greeting
  const greeting = document.createElement('p');
  greeting.className = 'greeting';
  greeting.innerHTML = `Hello, <strong>${student.name}</strong>. Here's a summary of your recent and upcoming assignments.`;
  body.appendChild(greeting);

  // Missing section
  body.appendChild(Object.assign(document.createElement('div'), { className: 'divider' }));
  const missingLabel = document.createElement('p');
  missingLabel.className = 'section-label missing';
  missingLabel.textContent = 'Missing — last 2 weeks';
  body.appendChild(missingLabel);
  const missingChips = document.createElement('div');
  missingChips.className = 'chips';
  if (missing.length === 0) {
    missingChips.appendChild(emptyChip('No missing assignments \uD83C\uDF89'));
  } else {
    missing.forEach(m => missingChips.appendChild(chip(m, 'missing')));
  }
  body.appendChild(missingChips);

  // Upcoming section
  body.appendChild(Object.assign(document.createElement('div'), { className: 'divider' }));
  const upcomingLabel = document.createElement('p');
  upcomingLabel.className = 'section-label upcoming';
  upcomingLabel.textContent = 'Upcoming — next 2 weeks';
  body.appendChild(upcomingLabel);
  const upcomingChips = document.createElement('div');
  upcomingChips.className = 'chips';
  if (upcoming.length === 0) {
    upcomingChips.appendChild(emptyChip('No upcoming assignments'));
  } else {
    upcoming.forEach(u => upcomingChips.appendChild(chip(u.name, 'upcoming', u.due)));
  }
  body.appendChild(upcomingChips);

  // Footer / sign-off
  body.appendChild(Object.assign(document.createElement('div'), { className: 'divider' }));
  const footer = document.createElement('p');
  footer.className = 'footer';
  footer.innerHTML = `Thanks, <strong>${teacherName}</strong>`;
  body.appendChild(footer);
}

init();
</script>
</body>
</html>
